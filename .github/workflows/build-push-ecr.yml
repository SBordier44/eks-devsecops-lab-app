name: Build and Push Docker image to ECR

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: eks-devsecops-lab-dev-app
  GITOPS_REPO_NAME: SBordier44/eks-devsecops-lab-gitops

jobs:
  build-and-push:
    name: Build and push image to Amazon ECR
    runs-on: ubuntu-latest
    environment: production

    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_APP_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-build-push-ecr

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA="sha-$(echo ${GITHUB_SHA} | cut -c1-7)"
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.short_sha }}
          labels:
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show published image
        run: |
          echo "Pushed image: "
          echo "${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.short_sha }}"

  update-gitops:
    name: Update GitOps repository
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GITOPS_REPO_NAME }}
          ref: main
          path: gitops
          token: ${{ secrets.GITOPS_REPO_TOKEN }}

      - name: Debug workspace
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type d | sort

      - name: Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tag with Kustomize
        run: |
          cd gitops/apps/demo-app/overlays/dev
          kustomize edit set image eks-devsecops-dev-app=${{ needs.build-and-push.outputs.image_uri }}:${{ needs.build-and-push.outputs.short_sha }}

      - name: Commit and push GitOps changes
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "deploy(demo-app): update image to ${{ needs.build-and-push.outputs.short_sha }}"
          git push origin main
