name: Build and Push Docker image to GHCR

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  security-events: write

env:
  IMAGE_NAME: eks-devsecops-lab-dev-app
  GITOPS_REPO_NAME: SBordier44/eks-devsecops-lab-gitops
  KUSTOMIZE_VERSION: 5.8.1

jobs:
  build-and-push:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      image_uri: ${{ steps.meta.outputs.image_uri }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA="sha-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_URI="ghcr.io/${OWNER_LC}/${{ env.IMAGE_NAME }}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan pushed image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: image
          image-ref: ${{ steps.meta.outputs.image_uri }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Show published image
        run: |
          echo "Pushed image:"
          echo "${{ steps.meta.outputs.image_uri }}:${{ steps.meta.outputs.short_sha }}"
          echo "Digest:"
          echo "${{ steps.build.outputs.digest }}"

  update-gitops:
    name: Update GitOps repository
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GITOPS_REPO_NAME }}
          ref: main
          path: gitops
          token: ${{ secrets.GITOPS_REPO_TOKEN }}

      - name: Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s -- "${{ env.KUSTOMIZE_VERSION }}"
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Update image tag with Kustomize
        run: |
          cd gitops/apps/demo-app/overlays/k3s-dev
          kustomize edit set image eks-devsecops-lab-dev-app=${{ needs.build-and-push.outputs.image_uri }}:${{ needs.build-and-push.outputs.short_sha }}

      - name: Commit and push GitOps changes
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "deploy(demo-app): update image to ${{ needs.build-and-push.outputs.short_sha }}"
          git push origin main
